x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: customeros-airflow:latest
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    RAW_HOST: raw_db
    RAW_PORT: 5432
    RAW_DB: customeros_raw
    RAW_USER: ${RAW_USER}
    RAW_PASSWORD: ${RAW_PASSWORD}
    WH_HOST: warehouse_db
    WH_PORT: 5432
    WH_DB: customeros_warehouse
    WH_USER: ${WH_USER}
    WH_PASSWORD: ${WH_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./dbt_customeros:/opt/airflow/dbt_customeros
    - ./loaders:/opt/airflow/loaders
    - ./data_generator:/opt/airflow/data_generator
    - ./data:/opt/airflow/data
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    airflow_db:
      condition: service_healthy

services:
  raw_db:
    image: postgres:15
    environment:
      POSTGRES_DB: customeros_raw
      POSTGRES_USER: ${RAW_USER}
      POSTGRES_PASSWORD: ${RAW_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - raw_data:/var/lib/postgresql/data
      - ./init_scripts/raw_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAW_USER} -d customeros_raw"]
      interval: 5s
      retries: 5

  warehouse_db:
    image: postgres:15
    environment:
      POSTGRES_DB: customeros_warehouse
      POSTGRES_USER: ${WH_USER}
      POSTGRES_PASSWORD: ${WH_PASSWORD}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WH_USER} -d customeros_warehouse"]
      interval: 5s
      retries: 5

  airflow_db:
    image: postgres:15
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin --password admin
      --firstname CustomerOS --lastname Admin
      --role Admin --email admin@customeros.io || true"
    depends_on:
      airflow_db:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    ports:
      - "127.0.0.1:8080:8080"
    command: webserver
    depends_on:
      airflow_db:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow_db:
        condition: service_healthy

volumes:
  raw_data:
  warehouse_data:
  airflow_db_data: